<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Quivro</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/logo/logo_only.png" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('quivro.theme');
          if (t !== 'dark' && t !== 'light') {
            t =
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
